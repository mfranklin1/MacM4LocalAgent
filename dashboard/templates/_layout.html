<!doctype html>
<html lang="en">
<head>

  <title>{% block title %}M5 Hybrid Agent{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>

    <div class="brand">
      <strong>M5 Hybrid Agent</strong>
      <span class="muted">Cline &rarr; LiteLLM &rarr; (Ollama+TurboQuant | Claude)</span>

</html>

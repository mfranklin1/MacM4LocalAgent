model_list:
  - model_name: local-long
    litellm_params:
      model: ollama/@@OLLAMA_TAG@@
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
      # Pass num_ctx explicitly so Ollama uses LOCAL_LONG_CTX regardless of
      # whatever is baked into the model's Modelfile. This must stay in sync
      # with ROUTE_LONG_MAX (both driven from LOCAL_LONG_CTX in detected.env).
      extra_body:
        options:
          num_ctx: @@LOCAL_LONG_CTX@@

  # Tool-capable agent model. Pull beforehand: `ollama pull llama3.1:8b-instruct-q8_0`.
  # Unlike local-long (qwen3-coder-next), llama3.1 reliably emits the
  # <tool_call>...</tool_call> envelope that Ollama's OpenAI-compat layer
  # parses into structured `tool_calls`, so Cursor's agent UI renders
  # progress correctly instead of showing raw JSON in the chat.
  - model_name: local-agent
    litellm_params:
      model: ollama_chat/llama3.1:8b-instruct-q8_0
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # Qwen2.5-Coder candidates for harness comparison (e.g. Cline replay
  # benchmark). Pull beforehand:
  #   ollama pull qwen2.5-coder:14b
  #   ollama pull qwen2.5-coder:32b
  - model_name: local-coder-14b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: local-coder-32b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:32b
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
      # local-coder-32b doubles as the Claude-tier fallback (see
      # router_settings.fallbacks): tool-native via ollama_chat/, so a
      # rate-limited claude-code turn that carries `tools` still produces
      # structured tool_calls instead of raw JSON text. Needs the full
      # window -- fallback prompts arrive at claude-code size (72K+ seen
      # in practice), and Ollama's Modelfile default would silently
      # truncate them.
      extra_body:
        options:
          num_ctx: @@LOCAL_LONG_CTX@@

  - model_name: claude-code
    # Default tier for the hybrid-auto router when it escalates to Claude.
    # Pinned to Sonnet 5 -- higher per-hour request quota than Opus on the
    # Team subscription token, which prevents rate-limit storms when Cline
    # retries rapidly. Use claude-opus-4-8 directly for tasks that need it.
    # Override per-turn with [haiku] or [opus] tags. Pricing per token
    # in cost.db is computed from cost/pricing.py, NOT the values below;
    # the input/output_cost_per_token fields here only affect LiteLLM's
    # internal /spend bookkeeping and are kept in sync as a courtesy.
    #
    # Auth is handled by the claude_proxy subscription endpoint (port 4002).
    # CLAUDE_AUTH_MODE=subscription (default) uses the macOS keychain OAuth
    # token; CLAUDE_AUTH_MODE=apikey uses ANTHROPIC_API_KEY instead.
    #
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_base: http://127.0.0.1:4002/subscription
      api_key: not-needed
      input_cost_per_token: 0.000002
      output_cost_per_token: 0.000010

  # Per-tier Claude aliases. Targets for the inline override tags
  # ([haiku] / [sonnet] / [opus]) and for callers that want to pin
  # a specific Claude model directly.
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_base: http://127.0.0.1:4002/subscription
      api_key: not-needed
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000005

  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_base: http://127.0.0.1:4002/subscription
      api_key: not-needed
      input_cost_per_token: 0.000002
      output_cost_per_token: 0.000010

  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_base: http://127.0.0.1:4002/subscription
      api_key: not-needed
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000025

  - model_name: hybrid-auto
    # Magic alias: the size-based router rewrites `data["model"]` to one of
    # the real groups above before LiteLLM dispatches upstream, so the
    # upstream params here are never actually used. We keep them harmless.
    litellm_params:
      model: ollama/@@OLLAMA_TAG@@
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      api_key: not-needed

  # ----------------------------------------------------------------------
  # Turbo context tiers (on-demand; only active when TURBO_ENABLED=1)
  # ----------------------------------------------------------------------
  # These backends run a separate mlx_lm.server on dedicated ports so the
  # primary Ollama (local-long) is never unloaded mid-conversation. Ports
  # 8084/8085 are reserved; port 8082 is the experimental
  # turboquant-experimental-serve llama.cpp probe and must not be reused here.
  #
  # Model path is substituted from TURBO_MODEL_LOCAL_DIR (set by turbo-install);
  # the placeholder renders to the absolute path of the downloaded 4-bit model.
  # turbo_kv_bits requires mlx-lm ≥ the unreleased PR (ml-explore/mlx#3328);
  # until that ships, TURBO_ENABLED must stay 0 — the backends won't start.
  - model_name: local-turbo-256k
    litellm_params:
      model: openai/@@TURBO_MODEL_LOCAL_DIR@@
      api_base: http://127.0.0.1:8084/v1
      api_key: not-needed
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: local-turbo-512k
    litellm_params:
      model: openai/@@TURBO_MODEL_LOCAL_DIR@@
      api_base: http://127.0.0.1:8085/v1
      api_key: not-needed
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ----------------------------------------------------------------------
  # gpt-* aliases for Cursor
  # ----------------------------------------------------------------------
  # Cursor's "Verify" button validates the model name client-side against
  # a regex that only accepts OpenAI-shaped ids (gpt-*, o1-*, o3-*, etc.).
  # Custom names like `local-agent` or `hybrid-auto` are rejected before
  # any network call is made. The aliases below give Cursor an OpenAI-
  # shaped name pointing at the same upstream model. The `route_by_size`
  # callback maps `gpt-hybrid-auto` -> the size-based decision, and the
  # over-generation controls treat `gpt-local-*` as local. From scripts
  # / CLI / benches, keep using the short names (`local-agent`, etc.).
  - model_name: gpt-local-long
    litellm_params:
      model: ollama/@@OLLAMA_TAG@@
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
      extra_body:
        options:
          num_ctx: @@LOCAL_LONG_CTX@@

  - model_name: gpt-local-agent
    litellm_params:
      model: ollama_chat/llama3.1:8b-instruct-q8_0
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: gpt-local-coder-14b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: gpt-local-coder-32b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:32b
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0
      # Mirror of local-coder-32b -- same fallback role for the gpt-*
      # Claude aliases, same full-window requirement.
      extra_body:
        options:
          num_ctx: @@LOCAL_LONG_CTX@@

  - model_name: gpt-claude-code
    # Cursor-shaped mirror of `claude-code`. Same upstream model.
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_base: http://127.0.0.1:4002/subscription
      api_key: not-needed
      input_cost_per_token: 0.000002
      output_cost_per_token: 0.000010

  # Cursor-shaped mirrors of the per-tier Claude aliases.
  - model_name: gpt-claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_base: http://127.0.0.1:4002/subscription
      api_key: not-needed
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000005

  - model_name: gpt-claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_base: http://127.0.0.1:4002/subscription
      api_key: not-needed
      input_cost_per_token: 0.000002
      output_cost_per_token: 0.000010

  - model_name: gpt-claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_base: http://127.0.0.1:4002/subscription
      api_key: not-needed
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000025

  - model_name: gpt-hybrid-auto
    litellm_params:
      model: ollama/@@OLLAMA_TAG@@
      api_base: http://127.0.0.1:@@OLLAMA_PORT@@
      api_key: not-needed

litellm_settings:
  drop_params: true
  callbacks: ["router.route_by_size.proxy_handler_instance"]
  success_callback: ["router.route_by_size.proxy_handler_instance"]
  database_url: "sqlite:///./cost/cost.db"
  set_verbose: false
  # Auto-cancel requests whose upstream connection is still open after
  # 360 s. Protects against orphaned Ollama generations when Cline drops
  # its network connection mid-stream (e.g. Cursor crash, laptop sleep).
  # The MacM4Handler client-side abort fires at 300 s; this proxy-side
  # timeout gives a 60 s grace window before LiteLLM closes the Ollama
  # socket itself.
  request_timeout: 360

router_settings:
  # Retry once before falling back, with a short pause to respect rate limits.
  num_retries: 1
  retry_after: 5
  # When a Claude group is rate-limited, fall back to local-long (Ollama).
  # Using a local model avoids Anthropic-specific param bleed-through that
  # occurs when falling back to another Anthropic model (e.g. thinking params
  # auto-injected by LiteLLM for Sonnet/Opus but rejected by Haiku).
  # Claude-tier fallbacks land on local-coder-32b, NOT local-long:
  # qwen3-coder-next (local-long) emits tool calls as raw JSON text on the
  # legacy ollama/ route, and router-level fallbacks bypass the pre-call
  # hook's tool-native redirect entirely -- so a rate-limited (429)
  # claude-code turn carrying `tools` used to stall Cline with an
  # unexecutable JSON blob. qwen2.5-coder:32b on ollama_chat/ is
  # tool-native and the strongest local tier for the complex tasks that
  # get routed to Claude in the first place.
  fallbacks:
    - claude-code: ["local-coder-32b"]
    - claude-sonnet-5: ["local-coder-32b"]
    - claude-opus-4-8: ["local-coder-32b"]
    - gpt-claude-code: ["gpt-local-coder-32b"]
    - gpt-claude-sonnet-5: ["gpt-local-coder-32b"]
    - gpt-claude-opus-4-8: ["gpt-local-coder-32b"]

# No general_settings.master_key by design.
#
# The proxy is bound to 127.0.0.1 only (see scripts/run_litellm.py invocation
# in ~/Library/LaunchAgents/com.local.litellm.plist) which is the actual
# security boundary on a personal Mac. A bearer-token gate on top of loopback
# adds no real protection -- anything that can connect to 127.0.0.1:4000 can
# also read the rotated key out of config/detected.env. Dropping the gate
# also removes the operational tax of pasting a new key into Cline / Cursor
# BYOK every time the key rotates.
#
# Re-enable for any of: multi-user macOS, port-forward via Tailscale or
# cloudflared, or LiteLLM virtual-key per-caller usage attribution. Add
# `general_settings: { master_key: @@LITELLM_MASTER_KEY@@ }` back here and
# restore the corresponding sed line in scripts/40-litellm.sh.
